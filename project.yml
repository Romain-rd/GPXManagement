name: GPXManagement
options:
  bundleIdPrefix: com.demoustier
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: fr
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      CODE_SIGN_IDENTITY: "Developer ID Application"

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  GPXCore:
    path: Packages/GPXCore
  GPXMapKit:
    path: Packages/GPXMapKit
  GPXStrava:
    path: Packages/GPXStrava

targets:
  GPXManagement:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "GPXManagement.entitlements"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: GPXManagement
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.healthcare-fitness
        NSHumanReadableCopyright: ""
        NSPhotoLibraryUsageDescription: "Pour afficher les photos prises pendant vos activités, à proximité de la trace enregistrée."
        StravaClientID: $(STRAVA_CLIENT_ID)
        StravaClientSecret: $(STRAVA_CLIENT_SECRET)
        BunnyApiKey: $(BUNNY_API_KEY)
        BunnyStorageZoneId: $(BUNNY_STORAGE_ZONE_ID)
        NSUbiquitousContainers:
          iCloud.com.demoustier.GPXManagement:
            NSUbiquitousContainerName: GPXManagement
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerSupportedFolderLevels: Any
        CFBundleDocumentTypes:
          - CFBundleTypeName: GPX Track
            LSHandlerRank: Alternate
            CFBundleTypeRole: Editor
            LSItemContentTypes:
              - public.xml
            CFBundleTypeExtensions:
              - gpx
          - CFBundleTypeName: FIT Activity
            LSHandlerRank: Alternate
            CFBundleTypeRole: Editor
            CFBundleTypeExtensions:
              - fit
    entitlements:
      path: App/GPXManagement.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.personal-information.photos-library: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.demoustier.GPXManagement
        com.apple.developer.icloud-services:
          - CloudDocuments
          - CloudKit
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.demoustier.GPXManagement
    dependencies:
      - package: GPXCore
      - package: GPXMapKit
      - package: GPXStrava
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.demoustier.GPXManagement
        PRODUCT_NAME: GPXManagement
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  GPXManagementTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Tests/GPXManagementTests
    dependencies:
      - target: GPXManagement
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.demoustier.GPXManagementTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  GPXManagement:
    build:
      targets:
        GPXManagement: all
        GPXManagementTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GPXManagementTests
    archive:
      config: Release
