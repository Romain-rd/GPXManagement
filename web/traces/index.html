<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Traces — GPXManagement</title>
<meta name="robots" content="noindex">
<style>
  :root { --accent:#1E88E5; --bg:#f5f5f7; --fg:#1d1d1f; --sec:#6e6e73; --card:#ffffff; --line:#e3e3e6; }
  @media (prefers-color-scheme: dark) { :root { --bg:#1c1c1e; --fg:#f5f5f7; --sec:#9a9a9e; --card:#2c2c2e; --line:#3a3a3c; } }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .box { max-width:520px; margin:24px; padding:36px; background:var(--card); border:1px solid var(--line); border-radius:18px; text-align:center; }
  .ic { font-size:40px; }
  h1 { font-size:24px; font-weight:700; letter-spacing:-.02em; margin:14px 0 8px; }
  p { color:var(--sec); margin:0 0 8px; }
  a.btn { display:inline-block; margin-top:16px; padding:9px 18px; border-radius:10px; background:var(--accent); color:#fff; text-decoration:none; font-weight:600; }
  footer { margin-top:22px; color:var(--sec); font-size:13px; }
  footer .madeby { color:var(--accent); font-weight:600; }
</style>
</head>
<body>
<div class="box">
  <div class="ic">🗺️</div>
  <h1>Sorties publiées</h1>
  <p>Cette section héberge les pages de présentation des activités GPXManagement.</p>
  <p>Chaque sortie est accessible via son <strong>lien direct</strong> (partagé depuis l'application). Le répertoire n'est pas listable.</p>
  <a class="btn" href="/">Accueil</a>
  <footer><span class="madeby">GPXManagement</span> · © Romain Demoustier</footer>
</div>
</body>
</html>
